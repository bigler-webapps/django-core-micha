name: Publish django-core-micha to PyPI

on:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"
      - "src/django_core_micha/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.14.5"

      - name: Decide whether to publish
        id: version_check
        run: |
          python - << 'PYCODE'
          import os
          import subprocess
          import tomllib
          from pathlib import Path

          github_event = os.environ.get("GITHUB_EVENT_NAME", "")
          output_path = Path(os.environ["GITHUB_OUTPUT"])

          def write_output(value: str) -> None:
              with output_path.open("a", encoding="utf-8") as handle:
                  handle.write(f"should_publish={value}\n")

          if github_event == "workflow_dispatch":
              print("Manual dispatch: publish enabled.")
              write_output("true")
              raise SystemExit(0)

          current = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]

          try:
              previous_raw = subprocess.check_output(
                  ["git", "show", "HEAD^:pyproject.toml"],
                  text=True,
              )
          except subprocess.CalledProcessError:
              print("No previous pyproject.toml found. Publishing.")
              write_output("true")
              raise SystemExit(0)

          previous = tomllib.loads(previous_raw)["project"]["version"]
          print(f"Previous version: {previous}")
          print(f"Current version:  {current}")

          def parse(version: str):
              return tuple(int(part) for part in version.split("."))

          if parse(current) > parse(previous):
              print("Version increased. Publishing.")
              write_output("true")
          else:
              print("Version did not increase. Skipping publish.")
              write_output("false")
          PYCODE

      - name: Show version from pyproject.toml
        if: steps.version_check.outputs.should_publish == 'true'
        run: |
          python - << 'PYCODE'
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          project_version = pyproject["project"]["version"]

          print(f"Version from pyproject.toml: {project_version}")
          PYCODE

      - name: Install build dependencies
        if: steps.version_check.outputs.should_publish == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        if: steps.version_check.outputs.should_publish == 'true'
        run: python -m build

      - name: Publish to PyPI
        if: steps.version_check.outputs.should_publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
